name: Build Cyanide Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-build:
    runs-on: macos-15 # Upgraded runner version to support newer Xcode project formats

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Select latest Xcode version
        run: |
          # Finds and switches to the latest available Xcode toolchain on the runner
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode_*.app" | sort -V | tail -n 1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Selecting $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run xcodebuild
        run: |
          mkdir -p build
          echo "==> xcodebuild (Cyanide / Debug / iphoneos)"
          
          xcodebuild \
            -project "Cyanide.xcodeproj" \
            -scheme "Cyanide" \
            -sdk "iphoneos" \
            -configuration "Debug" \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcbeautify --quiet 2>/dev/null \
            || xcodebuild \
                 -project "Cyanide.xcodeproj" \
                 -scheme "Cyanide" \
                 -sdk "iphoneos" \
                 -configuration "Debug" \
                 -derivedDataPath "$PWD/build/DerivedData" \
                 CODE_SIGNING_ALLOWED=NO \
                 build

      - name: Verify build output
        run: |
          APP_PATH="$PWD/build/DerivedData/Build/Products/Debug-iphoneos/Cyanide.app"
          if [ ! -d "$APP_PATH" ]; then
              echo "error: $APP_PATH not found after build" >&2
              exit 1
          fi

      - name: Package Unsigned IPA
        run: |
          APP_PATH="$PWD/build/DerivedData/Build/Products/Debug-iphoneos/Cyanide.app"
          
          # Read marketing version from Info.plist
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Info.plist" 2>/dev/null || true)
          if [ -z "$VERSION" ]; then
              echo "error: could not read CFBundleShortVersionString from $APP_PATH/Info.plist" >&2
              exit 1
          fi
          
          IPA_OUT="$PWD/build/Cyanide-${VERSION}.ipa"
          IPA_LATEST="$PWD/build/Cyanide.ipa"
          IPA_BASENAME=$(basename "$IPA_OUT")
          LATEST_BASENAME=$(basename "$IPA_LATEST")
          
          echo "==> packaging $IPA_OUT (version $VERSION)"
          STAGE=$(mktemp -d -t cyanide-ipa)
          mkdir -p "$STAGE/Payload"
          cp -R "$APP_PATH" "$STAGE/Payload/"
          rm -f "$IPA_OUT"
          
          ( cd "$STAGE" && zip -qry "$IPA_OUT" Payload )
          rm -rf "$STAGE"
          
          # Handle unversioned symlink
          rm -f "$IPA_LATEST"
          ( cd "$PWD/build" && ln -s "$IPA_BASENAME" "$LATEST_BASENAME" )
          
          SIZE=$(du -h "$IPA_OUT" | cut -f1)
          echo "==> wrote $IPA_OUT ($SIZE)"
          echo "==> symlink $IPA_LATEST -> $IPA_BASENAME"

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cyanide-Unsigned-IPA
          path: build/*.ipa
          if-no-files-found: error
